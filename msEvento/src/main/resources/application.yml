server:
  port: 8085

spring:
  application:
    name: msEvento
  datasource:
    url: jdbc:mysql://localhost:3306/eventos_bd
    username: root
    password:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

springdoc:
  api-docs:
    enabled: true
    version: openapi_3_0
  swagger-ui:
    enabled: true      

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/     